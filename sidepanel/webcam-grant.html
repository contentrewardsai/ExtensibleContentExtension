<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Allow camera</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; max-width: 380px; }
    h1 { font-size: 1rem; margin: 0 0 8px; }
    p { color: #444; font-size: 0.9rem; margin: 0 0 12px; line-height: 1.4; }
    button { padding: 10px 16px; font-size: 0.95rem; cursor: pointer; }
    #status { color: #b00020; font-size: 0.85rem; margin-top: 10px; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Camera for workflow recording</h1>
  <p>Chrome needs a visible prompt to allow the webcam for this extension. Click the button, then choose your camera in the browser dialog.</p>
  <button type="button" id="allowCam">Allow camera</button>
  <div id="status" aria-live="polite"></div>
  <script src="webcam-grant.js"></script>
</body>
</html>
