<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Generator — Extensible Content</title>
  <link rel="stylesheet" href="generator.css">
  <link rel="stylesheet" href="editor/editor.css">
</head>
<body>
  <div class="gen-layout">
    <aside class="gen-sidebar">
      <div class="gen-generator-panel">
        <h2 class="gen-generator-title">GENERATOR</h2>
        <div class="gen-template-list">
          <label for="pluginSelect">Template</label>
          <select id="pluginSelect">
            <option value="">— Choose template —</option>
          </select>
          <p class="gen-template-hint">From <code>generator/templates/</code>. Bulk create fills data into the selected template.</p>
          <p class="gen-import-json-wrap" id="importJsonWhenNoTemplateWrap" style="display:none;">
            <button type="button" id="importJsonWhenNoTemplate" class="gen-add-content-btn">Import JSON</button>
            <span class="gen-muted" style="font-size:11px;">Create a new template from ShotStack JSON.</span>
          </p>
          <p id="pluginDescription" class="gen-plugin-description" style="display:none;"></p>
        </div>
        <div class="gen-variables" id="variablesPanel"></div>
        <div class="gen-editor-elements" id="editorElementsWrap" style="display:none;">
          <div class="gen-section-label">Edit & add content</div>
          <div id="editorAddContent" class="gen-add-content"></div>
          <div class="gen-section-label">Layers</div>
          <div id="editorLayersPanel" class="gen-layers-panel"></div>
          <div id="editorPropertiesPanel" class="gen-properties-panel"></div>
        </div>
        <div class="gen-editor-actions" id="genEditorActions" style="display:none;">
          <button type="button" id="importShotstackJsonBtn" class="secondary" title="Import a ShotStack JSON template file">Import ShotStack JSON</button>
          <button type="button" id="exportShotstackJsonBtn" class="secondary" title="Export the current template as ShotStack JSON">Export ShotStack JSON</button>
          <button type="button" id="bulkCreateBtn" class="secondary" title="Create many outputs from this template">Bulk create</button>
          <button type="button" id="createFromWorkflowBtn" class="secondary" title="Create from workflow step data">From workflow</button>
          <button type="button" id="createFromScheduledBtn" class="secondary" title="Create from scheduled workflow">From scheduled</button>
          <button type="button" id="saveTemplateBtn" class="secondary" title="Save changes to the current template in-place (Ctrl+S)">Save</button>
          <button type="button" id="versionHistoryBtn" class="secondary" title="View and restore previous versions of this template">Version History</button>
          <button type="button" id="saveAsTemplateBtn" class="secondary" title="Save current design as a new template (different name or version)">Save as new template</button>
          <button type="button" id="saveToProjectFolderBtn" class="secondary" title="Save template to generator/templates/ in your project folder (set in side panel)">Save to project folder</button>
        </div>
        <div id="stepGeneratorSections" class="gen-step-sections"></div>
      </div>
      <div class="gen-open-sidepanel" id="openSidepanelWrap" style="display:none;">
        <a href="#" id="openSidepanelLink">Open sidebar panel</a>
      </div>
    </aside>
    <main class="gen-preview-area">
      <div class="gen-preview-toolbar" id="previewToolbar">
        <select id="genProjectSelect" class="gen-project-select" title="Save generations to this project" style="display:none;">
          <option value="">No project</option>
        </select>
        <button type="button" id="exportImageBtn" class="secondary" style="display:none;">Export as PNG</button>
        <button type="button" id="exportVideoBtn" class="secondary" style="display:none;">Export video</button>
        <button type="button" id="exportAudioBtn" class="secondary" style="display:none;">Download audio</button>
        <button type="button" id="exportBookBtn" class="secondary" style="display:none;">Export book</button>
      </div>
      <div id="exportErrorBanner" class="gen-export-error-banner" style="display:none;" role="alert">
        <span id="exportErrorText"></span>
        <button type="button" id="exportErrorCopy" class="secondary" title="Copy error message">Copy</button>
        <button type="button" id="exportErrorRetry" class="secondary">Retry</button>
        <button type="button" id="exportErrorDismiss" class="secondary">Dismiss</button>
      </div>
      <div id="previewContainer" class="gen-preview-plugin-wrap" style="display:none;"></div>
      <div class="gen-preview-frame-wrap" id="previewFrameWrap">
        <div id="previewPlaceholder" style="padding:24px;color:var(--gen-muted);">
          Select a generator to see the preview.
        </div>
      </div>
    </main>
  </div>
  <script src="../lib/html2canvas.min.js"></script>
  <script src="../lib/fabric.min.js"></script>
  <script src="../lib/fabric-textbaseline-patch.js"></script>
  <!-- Same ExtensionApi stack as sidepanel so Generator project list matches (local + Whop projects). -->
  <script src="../config/whop-auth.example.js"></script>
  <script src="../config/whop-auth.js"></script>
  <script src="../extension/config.js"></script>
  <script src="../extension/api.js"></script>
  <!-- Inputs and outputs are loaded from generator/inputs/manifest.json and generator/outputs/manifest.json; add new types there (no index.html edit). -->
  <script src="../shared/manifest-loader.js"></script>
  <script src="load-from-manifest.js"></script>
</body>
</html>
