<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Recorder integration – stop vs typing</title>
</head>
<body>
  <p>Recorder integration tests (driven by Puppeteer via <code>?case=</code>).</p>
  <script>
    window.chrome = {
      runtime: {
        onMessage: {
          addListener: function (fn) {
            window.__recorderOnMessage = fn;
          },
        },
      },
    };
    if (typeof window.__CFS_contentScriptRecorderInstalled !== 'undefined') {
      try {
        delete window.__CFS_contentScriptRecorderInstalled;
      } catch (_) {}
    }
  </script>
  <script src="../shared/selectors.js"></script>
  <script src="../shared/recording-value.js"></script>
  <script src="../content/recorder.js"></script>
  <script>
    (function () {
      'use strict';

      function fail(msg) {
        window.__RECORDER_TEST_RESULT__ = { ok: false, error: String(msg) };
        window.__RECORDER_TEST_DONE__ = true;
      }
      function pass() {
        window.__RECORDER_TEST_RESULT__ = { ok: true };
        window.__RECORDER_TEST_DONE__ = true;
      }

      function sendRecorder(msg) {
        var res;
        if (typeof window.__recorderOnMessage !== 'function') {
          fail('recorder onMessage not registered');
          return null;
        }
        window.__recorderOnMessage(msg, {}, function (r) {
          res = r;
        });
        return res;
      }

      function dispatchInput(el) {
        el.dispatchEvent(new Event('input', { bubbles: true }));
      }

      function dispatchEnter(el) {
        el.dispatchEvent(
          new KeyboardEvent('keydown', { key: 'Enter', bubbles: true, cancelable: true })
        );
      }

      var caseParam = new URLSearchParams(location.search).get('case') || 'debounce';

      window.__RECORDER_TEST_DONE__ = false;
      window.__RECORDER_TEST_RESULT__ = null;

      try {
        if (caseParam === 'debounce') {
          var r0 = sendRecorder({ type: 'RECORDER_START', workflowId: 't1' });
          if (!r0 || !r0.ok) return fail('RECORDER_START: ' + JSON.stringify(r0));
          var input = document.createElement('input');
          input.type = 'text';
          document.body.appendChild(input);
          input.value = 'hello';
          dispatchInput(input);
          var stop = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stop || !stop.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stop));
          var types = (stop.actions || []).filter(function (a) {
            return a.type === 'type';
          });
          if (types.length !== 1) {
            return fail('expected 1 type action, got ' + types.length + ': ' + JSON.stringify(stop.actions));
          }
          if (types[0].recordedValue !== 'hello') {
            return fail('recordedValue expected hello, got ' + JSON.stringify(types[0].recordedValue));
          }
          return pass();
        }

        if (caseParam === 'stable') {
          var r1 = sendRecorder({ type: 'RECORDER_START', workflowId: 't2' });
          if (!r1 || !r1.ok) return fail('RECORDER_START: ' + JSON.stringify(r1));
          var inp2 = document.createElement('input');
          inp2.type = 'text';
          document.body.appendChild(inp2);
          inp2.value = 'x';
          dispatchInput(inp2);
          var stop2 = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stop2 || !stop2.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stop2));
          var n = (stop2.actions || []).length;
          if (n < 1) return fail('stable: expected at least one action from RECORDER_STOP');
          setTimeout(function () {
            var st = sendRecorder({ type: 'RECORDER_STATUS' });
            // finalizeRecordingSession copies actions into the stop payload then clears the buffer.
            if (!st || st.actionCount !== 0) {
              return fail(
                'after 650ms RECORDER_STATUS actionCount expected 0 (cleared after stop), got ' +
                  (st && st.actionCount)
              );
            }
            pass();
          }, 650);
          return;
        }

        if (caseParam === 'enter') {
          var r2 = sendRecorder({ type: 'RECORDER_START', workflowId: 't3' });
          if (!r2 || !r2.ok) return fail('RECORDER_START: ' + JSON.stringify(r2));
          var form = document.createElement('form');
          var inp3 = document.createElement('input');
          inp3.type = 'text';
          inp3.name = 'q';
          form.appendChild(inp3);
          document.body.appendChild(form);
          inp3.focus();
          inp3.value = 'line';
          dispatchInput(inp3);
          dispatchEnter(inp3);
          var stop3 = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stop3 || !stop3.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stop3));
          var types3 = (stop3.actions || []).filter(function (a) {
            return a.type === 'type';
          });
          if (types3.length !== 1) {
            return fail('enter: expected 1 type, got ' + types3.length);
          }
          if (types3[0].recordedValue !== 'line') {
            return fail('enter: recordedValue ' + JSON.stringify(types3[0].recordedValue));
          }
          setTimeout(function () {
            var st3 = sendRecorder({ type: 'RECORDER_STATUS' });
            if (!st3 || st3.actionCount !== 0) {
              return fail('enter: RECORDER_STATUS actionCount expected 0 after stop, got ' + (st3 && st3.actionCount));
            }
            pass();
          }, 200);
          return;
        }

        if (caseParam === 'contenteditable') {
          var r3 = sendRecorder({ type: 'RECORDER_START', workflowId: 't4' });
          if (!r3 || !r3.ok) return fail('RECORDER_START: ' + JSON.stringify(r3));
          var div = document.createElement('div');
          div.setAttribute('contenteditable', 'true');
          document.body.appendChild(div);
          div.textContent = '';
          div.appendChild(document.createTextNode('ce'));
          dispatchInput(div);
          var stop4 = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stop4 || !stop4.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stop4));
          var types4 = (stop4.actions || []).filter(function (a) {
            return a.type === 'type';
          });
          if (types4.length !== 1) return fail('ce: expected 1 type');
          if (types4[0].recordedValue !== 'ce') {
            return fail('ce: value ' + JSON.stringify(types4[0].recordedValue));
          }
          return pass();
        }

        if (caseParam === 'scroll') {
          var rScroll = sendRecorder({ type: 'RECORDER_START', workflowId: 'tScroll' });
          if (!rScroll || !rScroll.ok) return fail('RECORDER_START: ' + JSON.stringify(rScroll));
          var tallDiv = document.createElement('div');
          tallDiv.style.cssText = 'height:200px;overflow:auto;';
          var inner = document.createElement('div');
          inner.style.height = '2000px';
          inner.textContent = 'scrollable content';
          tallDiv.appendChild(inner);
          document.body.appendChild(tallDiv);
          // Recorder listens for 'wheel' on document (capture), not 'scroll'
          tallDiv.dispatchEvent(new WheelEvent('wheel', { deltaX: 0, deltaY: 200, bubbles: true }));
          // Give the recorder's SCROLL_COALESCE_MS (400ms) time to flush
          setTimeout(function () {
            var stopScroll = sendRecorder({ type: 'RECORDER_STOP' });
            if (!stopScroll || !stopScroll.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stopScroll));
            var scrollActions = (stopScroll.actions || []).filter(function (a) {
              return a.type === 'scroll';
            });
            if (scrollActions.length < 1) {
              return fail('scroll: expected at least 1 scroll action, got ' + scrollActions.length + ': ' + JSON.stringify(stopScroll.actions));
            }
            return pass();
          }, 600);
          return;
        }

        if (caseParam === 'select') {
          var rSel = sendRecorder({ type: 'RECORDER_START', workflowId: 'tSelect' });
          if (!rSel || !rSel.ok) return fail('RECORDER_START: ' + JSON.stringify(rSel));
          var sel = document.createElement('select');
          sel.name = 'color';
          var opt1 = document.createElement('option');
          opt1.value = 'a';
          opt1.textContent = 'Option A';
          var opt2 = document.createElement('option');
          opt2.value = 'b';
          opt2.textContent = 'Option B';
          sel.appendChild(opt1);
          sel.appendChild(opt2);
          document.body.appendChild(sel);
          sel.value = 'b';
          sel.dispatchEvent(new Event('change', { bubbles: true }));
          var stopSel = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stopSel || !stopSel.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stopSel));
          var selActions = (stopSel.actions || []).filter(function (a) {
            return a.type === 'select';
          });
          if (selActions.length !== 1) {
            return fail('select: expected 1 select action, got ' + selActions.length + ': ' + JSON.stringify(stopSel.actions));
          }
          // Recorder sets variableKey from the name attribute, not recordedValue
          if (selActions[0].variableKey !== 'color') {
            return fail('select: variableKey expected color, got ' + JSON.stringify(selActions[0].variableKey));
          }
          return pass();
        }

        if (caseParam === 'dragdrop') {
          var rDrag = sendRecorder({ type: 'RECORDER_START', workflowId: 'tDrag' });
          if (!rDrag || !rDrag.ok) return fail('RECORDER_START: ' + JSON.stringify(rDrag));
          var src = document.createElement('div');
          src.setAttribute('draggable', 'true');
          src.textContent = 'drag me';
          src.id = 'drag-src';
          document.body.appendChild(src);
          var tgt = document.createElement('div');
          tgt.id = 'drag-tgt';
          tgt.textContent = 'drop here';
          document.body.appendChild(tgt);
          // Simulate drag start on source
          src.dispatchEvent(new DragEvent('dragstart', { bubbles: true }));
          // Simulate drop on target
          tgt.dispatchEvent(new DragEvent('drop', { bubbles: true }));
          var stopDrag = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stopDrag || !stopDrag.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stopDrag));
          var dragActions = (stopDrag.actions || []).filter(function (a) {
            return a.type === 'dragDrop';
          });
          if (dragActions.length !== 1) {
            return fail('dragdrop: expected 1 dragDrop action, got ' + dragActions.length + ': ' + JSON.stringify(stopDrag.actions));
          }
          // dragDrop action should have sourceSelectors and targetSelectors
          if (!dragActions[0].sourceSelectors || !dragActions[0].sourceSelectors.length) {
            return fail('dragdrop: missing sourceSelectors');
          }
          if (!dragActions[0].targetSelectors || !dragActions[0].targetSelectors.length) {
            return fail('dragdrop: missing targetSelectors');
          }
          return pass();
        }

        if (caseParam === 'linknav') {
          var rLink = sendRecorder({ type: 'RECORDER_START', workflowId: 'tLink' });
          if (!rLink || !rLink.ok) return fail('RECORDER_START: ' + JSON.stringify(rLink));
          // Use a button (not <a>) to test the standard click recording path via pointerdown
          var btn = document.createElement('button');
          btn.textContent = 'Click me';
          btn.id = 'nav-btn';
          document.body.appendChild(btn);
          // pointerdown triggers pushClickAction for non-link elements
          btn.dispatchEvent(new PointerEvent('pointerdown', { bubbles: true, button: 0 }));
          var stopLink = sendRecorder({ type: 'RECORDER_STOP' });
          if (!stopLink || !stopLink.ok) return fail('RECORDER_STOP: ' + JSON.stringify(stopLink));
          var clickActions = (stopLink.actions || []).filter(function (a) {
            return a.type === 'click';
          });
          if (clickActions.length < 1) {
            return fail('linknav: expected at least 1 click action, got ' + clickActions.length + ': ' + JSON.stringify(stopLink.actions));
          }
          return pass();
        }

        fail('unknown case: ' + caseParam);
      } catch (e) {
        fail(e && e.message ? e.message : String(e));
      }
    })();
  </script>
</body>
</html>
